name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm vitest run

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgres://placeholder/test
          REDIS_URL: https://placeholder.upstash.io
          CALLSOFIA_API_BASE_URL: https://api.callsofia.co
          CALLSOFIA_ORG_ID: 10000000-0000-0000-0000-000000000001
          CALLSOFIA_API_KEY: build_placeholder
          CALLSOFIA_WEBHOOK_SECRET: build_placeholder
          CRM_ADAPTER: none
          ADMIN_PASSWORD: build_placeholder_pw
